<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task-Engine | UI Architect</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="todo-card">
        <header>
            <h2>Task Manager</h2>
            <p>System State: <span id="taskCount">0</span> tasks</p>
        </header>

        <section class="input-group">
            <input type="text" id="taskInput" placeholder="Enter a new task..." aria-label="Task Input">
            <button type="button" class="add-btn" onclick="handleNewTask()">Add</button>
        </section>

        <ul id="listContainer">
            </ul>

        <footer id="footerAction" class="footer-action">
            <button type="button" class="clear-btn" onclick="clearAllTasks()">Clear All Tasks</button>
        </footer>
    </main>

    <script src="todoLogic.js"></script>
</body>
</html>
